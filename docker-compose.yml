# Local / staging: build image and run with a named volume for data/products.ttl
# Add `env_file: .env` under `dpp-event` if you use a root `.env` for secrets.
services:
  dpp-event:
    build: .
    ports:
      - "3001:3000"
    environment:
      PORT: "3000"
    volumes:
      - dpp-data:/app/data

volumes:
  dpp-data:
